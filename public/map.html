<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orhun AI — Location Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #060b1a; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; }

    #topbar {
      background: #0a1530;
      border-bottom: 1px solid rgba(220,38,38,0.3);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      min-height: 52px; flex-shrink: 0;
    }
    .badge { background: linear-gradient(135deg,#dc2626,#9f1919); color:#fff; font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; padding:4px 10px; border-radius:6px; }
    .info { flex:1; }
    .title { color:#f5e6c0; font-size:14px; font-weight:600; }
    .subtitle { color:#8f5e16; font-size:11px; margin-top:1px; }
    .coords { background:rgba(245,179,66,.08); border:1px solid rgba(245,179,66,.15); color:#c8a55a; font-family:monospace; font-size:11px; padding:4px 10px; border-radius:6px; }

    #map { flex: 1; }

    /* Dark controls */
    .leaflet-control-layers { background:rgba(10,21,48,.95)!important; border:1px solid rgba(245,179,66,.2)!important; border-radius:8px!important; }
    .leaflet-control-layers-list label { color:#d4b97a!important; font-size:12px; }
    .leaflet-control-layers-base label span { color:#d4b97a!important; }
    .leaflet-control-zoom a { background:rgba(10,21,48,.95)!important; color:#f5e6c0!important; border-color:rgba(245,179,66,.2)!important; }
    .leaflet-control-zoom a:hover { background:rgba(245,179,66,.1)!important; }
    .leaflet-control-attribution { background:rgba(10,21,48,.7)!important; color:#4a3a1a!important; font-size:9px; }
    .leaflet-control-attribution a { color:#8f5e16!important; }
    .leaflet-control-scale-line { background:rgba(10,21,48,.7)!important; border-color:rgba(245,179,66,.3)!important; color:#c8a55a!important; }
    .leaflet-popup-content-wrapper { background:rgba(10,21,48,.97)!important; border:1px solid rgba(245,179,66,.3)!important; color:#f5e6c0!important; box-shadow:0 8px 32px rgba(0,0,0,.6)!important; border-radius:10px!important; }
    .leaflet-popup-tip { background:rgba(10,21,48,.97)!important; }
    .leaflet-popup-close-button { color:#8f5e16!important; }
    .popup-body { padding:4px 0; }
    .popup-label { font-weight:700; color:#f5b342; margin-bottom:4px; font-size:13px; }
    .popup-row { color:#c8a55a; font-size:11px; margin-top:3px; }
    .popup-mono { font-family:monospace; color:#d4b97a; }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="badge">🛡 Orhun AI</div>
    <div class="info">
      <div class="title" id="topTitle">Foydalanuvchi joylashuvi</div>
      <div class="subtitle" id="topSub">IP orqali aniqlangan manzil</div>
    </div>
    <div class="coords" id="coordsBox">—</div>
  </div>
  <div id="map"></div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const lat     = parseFloat(p.get('lat') || '41.3');
    const lng     = parseFloat(p.get('lng') || '69.2');
    const zoom    = parseInt(p.get('zoom') || '13');
    const label   = p.get('label')   || 'Foydalanuvchi';
    const ip      = p.get('ip')      || '';
    const city    = p.get('city')    || '';
    const country = p.get('country') || '';
    const org     = p.get('org')     || '';
    const tz      = p.get('tz')      || '';

    document.getElementById('topTitle').textContent = label;
    document.getElementById('topSub').textContent   = [city, country].filter(Boolean).join(', ') || 'Manzil';
    document.getElementById('coordsBox').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);

    // ── Xarita ────────────────────────────────────────────
    const map = L.map('map', { center:[lat,lng], zoom:zoom, zoomControl:true });

    // 1. Esri Satellite — sof kosmik rasm (taglik qatlam)
    const esriSat = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { attribution:'Esri Satellite', maxZoom:20, maxNativeZoom:19 }
    );

    // 2. Google transparent labels — shaffof yozuvlar (ustki qatlam)
    const googleLabels = L.tileLayer(
      'http://{s}.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',
      { subdomains:['mt0','mt1','mt2','mt3'], attribution:'Google Labels', maxZoom:21, opacity:1 }
    );

    // 3. Hybrid = Esri Satellite + Google Labels (L.layerGroup)
    const hybridLayer = L.layerGroup([esriSat, googleLabels]);

    // 4. Google Hybrid (standart gibrid dvigatel)
    const googleHybrid = L.tileLayer(
      'http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
      { subdomains:['mt0','mt1','mt2','mt3'], attribution:'Google Hybrid', maxZoom:21 }
    );

    // 5. Google Streets (qo'shimcha)
    const googleStreet = L.tileLayer(
      'http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
      { subdomains:['mt0','mt1','mt2','mt3'], attribution:'Google Maps', maxZoom:21 }
    );

    // Default: Hybrid (Esri + Google Labels)
    hybridLayer.addTo(map);

    // Layer control
    L.control.layers(
      {
        '🛰 Hybrid (Esri Sat + Google Joy nomlari)' : hybridLayer,
        '🌍 Google Hybrid'                           : googleHybrid,
        '🗺 Google Ko\'cha xaritasi'                 : googleStreet,
        '🛰 Faqat Esri Satellite'                    : esriSat,
      },
      {},
      { position:'topright', collapsed:false }
    ).addTo(map);

    // Scale
    L.control.scale({ imperial:false, position:'bottomleft' }).addTo(map);

    // ── Marker ────────────────────────────────────────────
    const markerIcon = L.divIcon({
      className:'',
      html:'<div style="width:18px;height:18px;background:#dc2626;border-radius:50%;border:3px solid white;box-shadow:0 0 10px rgba(220,38,38,0.9);"></div>',
      iconSize:[18,18], iconAnchor:[9,9], popupAnchor:[0,-12],
    });

    const marker = L.marker([lat,lng], { icon:markerIcon }).addTo(map);

    // Pulse ring
    L.circleMarker([lat,lng], { radius:28, fillColor:'#dc2626', fillOpacity:.1, color:'#dc2626', weight:1, opacity:.35 }).addTo(map);

    const popup =
      '<div class="popup-body">' +
      '<div class="popup-label">📍 ' + label + '</div>' +
      (ip      ? '<div class="popup-row">🌐 IP: <span class="popup-mono">' + ip + '</span></div>' : '') +
      (city    ? '<div class="popup-row">🏙 ' + [city,country].filter(Boolean).join(', ') + '</div>' : '') +
      (org     ? '<div class="popup-row">📡 ' + org + '</div>' : '') +
      (tz      ? '<div class="popup-row">🕐 ' + tz + '</div>' : '') +
      '<div class="popup-row popup-mono">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</div>' +
      '</div>';

    marker.bindPopup(popup, { maxWidth:270 }).openPopup();
  </script>
</body>
</html>
